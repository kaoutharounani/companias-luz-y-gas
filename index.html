<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compañías de Luz y Gas</title>
    <style>
        :root {
            --bg-color: #f0f7ff;
            --card-bg: #ffffff;
            --border-color: #e1effe;
            --text-main: #1e3a5f;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            padding: 20px;
            color: var(--text-main);
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .column {
            background: white;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            flex: 1;
            min-width: 300px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .column-title {
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 25px;
            height: 50px;
            display: flex;
            align-items: center;
        }

        .logo-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
        }

        .logo-item {
            background: white;
            border: 1px solid #eee;
            border-radius: 10px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .logo-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .logo-item img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .footer-text {
            margin-top: 20px;
            font-size: 14px;
            color: #666;
            text-align: center;
        }
    </style>
</head>
<body>

    <h2 style="text-align: center; color: #1e3a5f; margin-bottom: 30px;">Compañías de luz y gas en España</h2>

    <div class="container">
        
        <div class="column">
            <div class="column-title">Compañías<br>mercado libre</div>
            <div class="logo-grid">
                <a href="https://www.papernest.es/endesa/" class="logo-item">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/4/43/Endesa_logo.svg" alt="Endesa">
                </a>
                <a href="https://www.papernest.es/totalenergies/" class="logo-item">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/1/10/TotalEnergies_logo.svg" alt="TotalEnergies">
                </a>
                <a href="https://www.papernest.es/repsol/" class="logo-item">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Repsol_logo.svg" alt="Repsol">
                </a>
                <a href="https://www.papernest.es/iberdrola/" class="logo-item">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/4/43/Iberdrola_Logo.svg" alt="Iberdrola">
                </a>
                <a href="https://www.papernest.es/holaluz/" class="logo-item">
                    <img src="https://cdn.papernest.com/assets/img/logos/suppliers/es/holaluz.svg" alt="Holaluz">
                </a>
                <a href="https://www.papernest.es/octopus-energy/" class="logo-item">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/3/30/Octopus_Energy_logo.svg" alt="Octopus Energy">
                </a>
            </div>
            <p class="footer-text">Comparamos más de 40 compañías</p>
        </div>

        <div class="column">
            <div class="column-title">Compañías<br>mercado regulado</div>
            <div class="logo-grid">
                <a href="https://www.papernest.es/chc-energia/" class="logo-item">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c2/CHC_Energ%C3%ADa_Logo.svg/1200px-CHC_Energ%C3%ADa_Logo.svg.png" alt="CHC">
                </a>
                </div>
        </div>

        <div class="column">
            <div class="column-title">Compañías<br>de energía verde</div>
            <div class="logo-grid">
                <a href="https://www.papernest.es/podo/" class="logo-item">
                    <img src="https://cdn.papernest.com/assets/img/logos/suppliers/es/podo.svg" alt="Podo">
                </a>
                <a href="https://www.papernest.es/lucera/" class="logo-item">
                    <img src="https://cdn.papernest.com/assets/img/logos/suppliers/es/lucera.svg" alt="Lucera">
                </a>
                <a href="https://www.papernest.es/energy-go/" class="logo-item">
                    <img src="https://cdn.papernest.com/assets/img/logos/suppliers/es/energy-go.svg" alt="Energy Go">
                </a>
            </div>
        </div>

    </div>

</body>
</html>
